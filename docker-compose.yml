version: "3.8" # 使用较新的 Compose 版本

services:
  # --- 后端服务 (Node.js + Express) ---
  backend:
    container_name: credit_backend # 容器名称
    # 【修改】替换为你实际的后端镜像地址和标签
    image: your-repo/credit-app-backend:latest
    restart: unless-stopped # 除非手动停止，否则总是尝试重启
    environment:
      # --- 【重要】配置后端环境变量 ---
      NODE_ENV: production
      # 【修改】数据库连接URL (PostgreSQL) - 请确保密码安全
      # 注意：这里的主机名 'db' 对应下方数据库服务的名称
      DATABASE_URL: "postgresql://${POSTGRES_USER:-dbuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-creditsdb}?schema=public"
      # 【修改】设置一个非常安全的 JWT 密钥
      JWT_SECRET: "<你的超级安全随机JWT密钥>"
      # 【修改】后端服务在容器内监听的端口
      BACKEND_PORT: "3001" # 与后端 Dockerfile EXPOSE 及 Nginx proxy_pass 后的端口一致
      # 【修改】SMTP 邮件发送配置
      SMTP_HOST: "<你的SMTP主机地址>"
      SMTP_PORT: "<SMTP端口号>" # 例如 587
      SMTP_SECURE: "<true或false>" # 例如 false (对于 587)
      SMTP_USER: "<SMTP用户名>"
      SMTP_PASS: "<SMTP密码或AppPassword>" # 【敏感】
      SMTP_FROM_EMAIL: "学分审查 <noreply@yourdomain.com>" # 【修改】
    networks:
      - credit_network # 加入自定义网络
    depends_on: # 依赖数据库服务
      db:
        condition: service_healthy # 等待数据库健康检查通过

  # --- 前端服务 (Nginx) ---
  frontend:
    container_name: credit_frontend # 容器名称
    # 【修改】替换为你实际的前端镜像地址和标签 (该镜像内部应包含 Nginx 和静态文件)
    image: your-repo/credit-app-frontend:latest
    restart: unless-stopped
    ports:
      # --- 【重要】配置端口映射 ---
      # 将服务器的 <你想用来访问的端口> 映射到容器内部 Nginx 监听的 80 端口
      # 如果你想通过服务器 IP 的 80 端口访问，就是 "80:80"
      - "80:80"
      # 如果 80 端口被占用，可以换一个，例如 "8888:80"
      # - "8888:80"
    networks:
      - credit_network
    depends_on: # 依赖后端服务 (Nginx 配置需要反代到 'backend')
      - backend

  # --- 数据库服务 (PostgreSQL) ---
  db:
    container_name: credit_db # 容器名称
    image: postgres:15-alpine # 使用官方 PostgreSQL 15 Alpine 镜像
    restart: unless-stopped
    environment:
      # --- 【重要】配置数据库环境变量 (需要与上面的 DATABASE_URL 匹配) ---
      POSTGRES_DB: ${POSTGRES_DB:-creditsdb} # 【修改或保留】数据库名称
      POSTGRES_USER: ${POSTGRES_USER:-dbuser} # 【修改或保留】数据库用户名
      POSTGRES_PASSWORD: "<你的数据库密码>" # 【修改】设置数据库密码【重要且敏感】
      # TZ: Asia/Shanghai # 可选：设置时区
    volumes:
      # 将数据库数据持久化到宿主机的 Docker volume
      # 也可以映射到宿主机目录：- ./data/postgres:/var/lib/postgresql/data
      - postgres_data:/var/lib/postgresql/data
    networks:
      - credit_network
    healthcheck: # 健康检查
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dbuser} -d ${POSTGRES_DB:-creditsdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s # 给数据库一些启动时间

# --- 网络定义 ---
networks:
  credit_network: # 定义一个自定义桥接网络
    driver: bridge

# --- 数据卷定义 ---
volumes:
  postgres_data: # 定义一个 Docker 命名卷来存储数据库数据
    driver: local
