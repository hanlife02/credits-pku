# frontend/nginx.conf

# 定义 Nginx 运行的用户和 worker 进程数
# user  nginx; # 在 Alpine 镜像中通常不需要指定
worker_processes auto;

# 定义错误日志路径和级别
error_log /var/log/nginx/error.log warn;
# 定义 Nginx 主进程 ID 文件路径
pid /var/run/nginx.pid;

# 事件模块配置
events {
    worker_connections 1024; # 每个 worker 进程允许的最大连接数
}

# HTTP 服务块配置
http {
    # 包含 MIME 类型定义文件
    include /etc/nginx/mime.types;
    # 定义默认 MIME 类型
    default_type application/octet-stream;

    # 日志格式定义
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 访问日志路径和格式
    access_log /var/log/nginx/access.log main;

    # 开启高效文件传输模式
    sendfile on;
    # 优化 TCP 包传输 (Nagle 算法)
    # tcp_nopush on;

    # 长连接超时时间
    keepalive_timeout 65;

    # 开启 Gzip 压缩 (可选，推荐)
    # gzip on;
    # gzip_vary on;
    # gzip_proxied any;
    # gzip_comp_level 6;
    # gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 定义虚拟主机 (Server)
    server {
        # 监听容器内的 80 端口
        listen 80;
        # 服务器名称 (容器内部访问时的主机名)
        server_name localhost;

        # 网站根目录，指向 React 应用构建后的静态文件
        root /usr/share/nginx/html;
        # 默认索引文件
        index index.html;

        # 处理单页面应用 (SPA) 路由
        # 对于所有不存在的文件或目录的请求，都返回 /index.html
        # 这是为了让 React Router 处理前端路由
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API 请求反向代理配置
        location /api {
            # 将所有 /api/* 的请求转发给后端服务
            # 'backend' 是 docker-compose.yml 中定义的后端服务名称
            # 3001 是后端服务在容器内监听的端口 (要与后端配置一致)
            proxy_pass http://backend:3001;

            # 传递必要的请求头给后端服务
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host; # 传递原始 Host 头
            proxy_set_header X-Real-IP $remote_addr; # 传递真实客户端 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 传递代理链 IP
            proxy_set_header X-Forwarded-Proto $scheme; # 传递原始请求协议 (http/https)
            proxy_cache_bypass $http_upgrade;
        }

        # (可选) 错误页面处理
        # error_page 500 502 503 504 /50x.html;
        # location = /50x.html {
        #     root /usr/share/nginx/html; # 或者 Nginx 默认错误页面目录
        # }
    }
}